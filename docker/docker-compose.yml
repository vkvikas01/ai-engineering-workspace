version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workspace

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: redis

    restart: always

    ports:
      - "6379:6379"

  adminer:
    image: adminer

    container_name: adminer

    restart: always

    ports:
      - "8080:8080"

volumes:

  postgres_data: